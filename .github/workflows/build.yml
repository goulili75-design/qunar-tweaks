name: Build QNByPass
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Tweak (arm64 for Dopamine)
      run: |
        set -e
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.m 2>&1
        EXIT=$?
        echo "Exit code: $EXIT"
        ls -la QNByPass.dylib
        SIZE=$(stat -f%z QNByPass.dylib 2>/dev/null || stat -c%s QNByPass.dylib 2>/dev/null || echo 0)
        echo "Size: $SIZE"
        if [ "$SIZE" -lt 10000 ]; then echo "ERROR: dylib too small!"; exit 1; fi
        file QNByPass.dylib
        ldid -S QNByPass.dylib 2>/dev/null || true
        echo "Tweak OK ($SIZE bytes)"
    - name: Package DEB
      run: |
        cd QNByPass
        mkdir -p deb/DEBIAN deb/var/jb/Library/MobileSubstrate/DynamicLibraries
        cp QNByPass.dylib deb/var/jb/Library/MobileSubstrate/DynamicLibraries/
        cp filter.plist deb/var/jb/Library/MobileSubstrate/DynamicLibraries/QNByPass.plist
        printf 'Package: com.qnbypass\nName: QNByPass\nVersion: 9.1\nArchitecture: iphoneos-arm64\nDescription: Qunar bypass for Dopamine\nMaintainer: goulili75\nSection: Tweaks\nDepends: mobilesubstrate\n' > deb/DEBIAN/control
        printf '#!/bin/sh\nkillall -9 SpringBoard 2>/dev/null\n' > deb/DEBIAN/postinst && chmod 0755 deb/DEBIAN/postinst
        brew install dpkg 2>/dev/null || true
        mkdir -p packages
        command -v dpkg-deb && dpkg-deb -Zgzip -b deb packages/com.qnbypass_9.0.deb || tar czf packages/QNByPass.tar.gz -C deb .
        ls -la packages/
    - uses: actions/upload-artifact@v4
      with:
        name: QNByPass-DEB
        path: |
          QNByPass/QNByPass.dylib
          QNByPass/filter.plist
        retention-days: 30
