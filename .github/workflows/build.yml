name: Build QNByPass Tweak
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Test
      run: |
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"
        echo "== Test compile =="
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -dynamiclib -framework Foundation -o test.dylib test.m 2>&1
        echo "Exit: $?"
        ls -la test.dylib
    - name: Build Tweak
      run: |
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "== Build tweak =="
        xcrun -sdk iphoneos clang++ -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.mm 2>&1
        echo "Exit: $?"
        ls -la QNByPass.dylib
        file QNByPass.dylib
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-dylib
        path: QNByPass/QNByPass.dylib
        retention-days: 30
