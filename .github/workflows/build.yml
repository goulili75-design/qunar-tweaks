name: Build QNByPass Tweak
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun -sdk iphoneos clang++ -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -install_name /Library/MobileSubstrate/DynamicLibraries/QNByPass.dylib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.mm
        ls -la QNByPass.dylib
        file QNByPass.dylib
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-dylib
        path: QNByPass/QNByPass.dylib
        retention-days: 30
