name: Build QNByPass Tweak

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Dylib
      run: |
        set -e
        cd QNByPass
        
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"
        ls -la
        
        # 编译纯 ObjC++ dylib
        # -undefined dynamic_lookup: substrate 函数在运行时解析
        xcrun -sdk iphoneos clang++ \
          -arch arm64 \
          -miphoneos-version-min=14.0 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -I. \
          -dynamiclib \
          -install_name /Library/MobileSubstrate/DynamicLibraries/QNByPass.dylib \
          -framework Foundation -framework UIKit \
          -Wl,-undefined,dynamic_lookup \
          -o QNByPass.dylib \
          Tweak_Compiled.mm
        
        echo "=== Build OK ==="
        ls -la QNByPass.dylib
        file QNByPass.dylib
        
        EXIT=$?
        echo "Exit code: $EXIT"
        
        if [ $EXIT -eq 0 ] && [ -f QNByPass.dylib ]; then
          echo "=== SUCCESS ==="
          ls -la QNByPass.dylib
          file QNByPass.dylib
          
          # 伪签名
          ldid -S QNByPass.dylib 2>/dev/null || codesign -s - QNByPass.dylib 2>/dev/null || true
        else
          echo "=== FAILED ==="
          exit 1
        fi

    - name: Package DEB
      run: |
        cd QNByPass
        
        mkdir -p deb_pkg/DEBIAN
        mkdir -p deb_pkg/Library/MobileSubstrate/DynamicLibraries
        
        cp QNByPass.dylib deb_pkg/Library/MobileSubstrate/DynamicLibraries/
        cp layout/Library/MobileSubstrate/DynamicLibraries/QNByPass.plist deb_pkg/Library/MobileSubstrate/DynamicLibraries/
        
        # 直接用 echo 创建 control 文件（避免 YAML heredoc 缩进冲突）
        echo "Package: com.yourcompany.qnbypass" > deb_pkg/DEBIAN/control
        echo "Name: QNByPass" >> deb_pkg/DEBIAN/control
        echo "Version: 1.0.0" >> deb_pkg/DEBIAN/control
        echo "Architecture: iphoneos-arm64" >> deb_pkg/DEBIAN/control
        echo "Description: Qunar jailbreak bypass for Dopamine RootHide" >> deb_pkg/DEBIAN/control
        echo "Maintainer: goulili75" >> deb_pkg/DEBIAN/control
        echo "Author: goulili75" >> deb_pkg/DEBIAN/control
        echo "Section: Tweaks" >> deb_pkg/DEBIAN/control
        echo "Depends: mobilesubstrate" >> deb_pkg/DEBIAN/control
        
        mkdir -p packages
        dpkg-deb -Zgzip -b deb_pkg packages/com.yourcompany.qnbypass_1.0.0_iphoneos-arm64.deb 2>&1 || {
          dpkg-deb -b deb_pkg packages/out.deb 2>&1
          mv packages/out.deb packages/com.yourcompany.qnbypass_1.0.0_iphoneos-arm64.deb 2>/dev/null
        }
        
        echo "=== Package ==="
        ls -la packages/

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-deb
        path: QNByPass/packages/*.deb
        retention-days: 30
