name: Build App+Tweak
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build App
      run: |
        cd QNByPass/App
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -framework UIKit -framework Foundation -o QNByPass main.m AppDelegate.m ViewController.m
        mkdir -p QNByPass.app && cp QNByPass QNByPass.app/ && cp Info.plist QNByPass.app/ && ls -la QNByPass
    - name: Build Tweak
      run: |
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.m
        ldid -S QNByPass.dylib 2>/dev/null || true
        ls -la QNByPass.dylib
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-App
        path: |
          QNByPass/App/QNByPass.app/**
          QNByPass/QNByPass.dylib
          QNByPass/filter.plist
        retention-days: 30
