name: Build QNByPass DEB
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Tweak
      run: |
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.m
        ldid -S QNByPass.dylib 2>/dev/null || true
        echo "Tweak OK"
    - name: Build App
      run: |
        cd QNByPass/App
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -framework UIKit -framework Foundation -o QNByPass main.m
        # 签名 entitlements（Dopamine 必须！）
        ldid -Sentitlements.plist QNByPass 2>/dev/null || true
        mkdir -p QNByPass.app && cp QNByPass QNByPass.app/ && cp Info.plist QNByPass.app/ && cp entitlements.plist QNByPass.app/
        echo "App OK"
    - name: Package DEB
      run: |
        cd QNByPass
        mkdir -p deb/DEBIAN deb/var/jb/Library/MobileSubstrate/DynamicLibraries deb/var/jb/Applications/QNByPass.app
        cp QNByPass.dylib deb/var/jb/Library/MobileSubstrate/DynamicLibraries/
        cp filter.plist deb/var/jb/Library/MobileSubstrate/DynamicLibraries/QNByPass.plist
        cp App/QNByPass.app/QNByPass deb/var/jb/Applications/QNByPass.app/
        cp App/Info.plist deb/var/jb/Applications/QNByPass.app/
        cp App/entitlements.plist deb/var/jb/Applications/QNByPass.app/
        printf 'Package: com.qnbypass.dopamine\nName: QNByPass\nVersion: 3.2.0\nArchitecture: iphoneos-arm64\nDescription: Qunar bypass + spoof for Dopamine\nMaintainer: goulili75\nSection: Tweaks\nDepends: mobilesubstrate\n' > deb/DEBIAN/control
        printf '#!/bin/sh\nchmod 755 /var/jb/Applications/QNByPass.app/QNByPass\nldid -S/var/jb/Applications/QNByPass.app/entitlements.plist /var/jb/Applications/QNByPass.app/QNByPass 2>/dev/null\nuicache -p /var/jb/Applications/QNByPass.app 2>/dev/null\nkillall -9 SpringBoard 2>/dev/null\n' > deb/DEBIAN/postinst && chmod 0755 deb/DEBIAN/postinst
        printf 'Package: com.qnbypass.dopamine\nName: QNByPass\nVersion: 3.1.0\nArchitecture: iphoneos-arm64\nDescription: Qunar bypass + spoof (shell)\nMaintainer: goulili75\nSection: Tweaks\nDepends: mobilesubstrate\n' > deb/DEBIAN/control
        printf '#!/bin/sh\nkillall -9 SpringBoard 2>/dev/null\n' > deb/DEBIAN/postinst && chmod 0755 deb/DEBIAN/postinst
        brew install dpkg 2>/dev/null || true
        mkdir -p packages
        if command -v dpkg-deb &>/dev/null; then dpkg-deb -Zgzip -b deb packages/com.qnbypass.dopamine_3.0.0_iphoneos-arm64.deb && echo "DEB OK"; else tar czf packages/QNByPass.tar.gz -C deb . && echo "TAR OK"; fi
        ls -la packages/
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-DEB
        path: QNByPass/packages/*
        retention-days: 30
