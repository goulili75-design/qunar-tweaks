name: Build QNByPass
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build All
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        cd QNByPass/App
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -fPIE -framework UIKit -framework Foundation -o QNByPass main.m AppDelegate.m ViewController.m
        ldid -Sentitlements.plist QNByPass 2>/dev/null || true
        mkdir -p QNByPass.app && cp QNByPass QNByPass.app/ && cp Info.plist QNByPass.app/ && cp entitlements.plist QNByPass.app/
        cd ..
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o QNByPass.dylib Tweak_Compiled.m
        ldid -S QNByPass.dylib 2>/dev/null || true
        echo "All built"
    - name: Package DEB
      run: |
        cd QNByPass
        # 正确路径：dpkg 自动映射 / -> /var/jb/
        mkdir -p deb/DEBIAN deb/var/jb/Applications/QNByPass.app deb/var/jb/Library/MobileSubstrate/DynamicLibraries
        cp QNByPass.dylib deb/var/jb/Library/MobileSubstrate/DynamicLibraries/
        cp filter.plist deb/var/jb/Library/MobileSubstrate/DynamicLibraries/QNByPass.plist
        cp App/QNByPass.app/QNByPass deb/var/jb/Applications/QNByPass.app/
        cp App/Info.plist deb/var/jb/Applications/QNByPass.app/
        cp App/entitlements.plist deb/var/jb/Applications/QNByPass.app/
        printf 'Package: com.qnbypass\nName: QNByPass\nVersion: 6.1\nArchitecture: iphoneos-arm64\nDescription: Qunar bypass\nMaintainer: goulili75\nSection: Tweaks\nDepends: mobilesubstrate\n' > deb/DEBIAN/control
        printf '#!/bin/sh\nchown root:wheel /var/jb/Applications/QNByPass.app/QNByPass 2>/dev/null\nchmod 755 /var/jb/Applications/QNByPass.app/QNByPass 2>/dev/null\nldid -S/var/jb/Applications/QNByPass.app/entitlements.plist /var/jb/Applications/QNByPass.app/QNByPass 2>/dev/null\nuicache -p /var/jb/Applications/QNByPass.app 2>/dev/null\nkillall -9 SpringBoard 2>/dev/null\n' > deb/DEBIAN/postinst && chmod 0755 deb/DEBIAN/postinst
        brew install dpkg 2>/dev/null || true
        mkdir -p packages
        command -v dpkg-deb && dpkg-deb -Zgzip -b deb packages/com.qnbypass_6.0.deb || tar czf packages/QNByPass.tar.gz -C deb .
        ls -la packages/
    - uses: actions/upload-artifact@v4
      with:
        name: QNByPass-DEB
        path: QNByPass/packages/*
        retention-days: 30
