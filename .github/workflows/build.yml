name: Build QNByPass Tweak

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: actions/checkout@v4
      with:
        repository: theos/theos
        path: theos
        ref: master
        submodules: true

    - name: Setup Theos Environment & SDK
      run: |
        # 移动 theos 到正确位置
        sudo mv theos /opt/theos
        sudo chmod -R 755 /opt/theos
        
        echo "THEOS=/opt/theos" >> $GITHUB_ENV
        echo "/opt/theos/bin" >> $GITHUB_PATH
        
        # 链接 SDK
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        SDK_VER=$(xcrun --sdk iphoneos --show-sdk-version)
        echo "SDK: $SDK_PATH (v$SDK_VER)"
        mkdir -p /opt/theos/sdks
        ln -sf "$SDK_PATH" "/opt/theos/sdks/iPhoneOS${SDK_VER}.sdk"
        
        # 验证
        ls /opt/theos/sdks/
        echo "Theos ready!"

    - name: Compile Tweak
      run: |
        cd QNByPass
        echo "Building with Theos..."
        make clean 2>/dev/null || true
        make package FINALPACKAGE=1 2>&1
        echo "=== Result ==="
        ls -la packages/ 2>/dev/null || echo "No packages dir"

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-deb
        path: |
          QNByPass/packages/*.deb
          QNByPass/*.deb
        retention-days: 30
