name: Build QNByPass Tweak

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Dylib
      run: |
        set -e
        cd QNByPass
        
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"
        ls -la
        
        # 编译纯 ObjC++ dylib
        # -undefined dynamic_lookup: substrate 函数在运行时解析
        xcrun -sdk iphoneos clang++ \
          -arch arm64 \
          -miphoneos-version-min=14.0 \
          -isysroot "$SDK" \
          -fobjc-arc \
          -I. \
          -dynamiclib \
          -install_name /Library/MobileSubstrate/DynamicLibraries/QNByPass.dylib \
          -framework Foundation -framework UIKit \
          -Wl,-undefined,dynamic_lookup \
          -o QNByPass.dylib \
          Tweak_Compiled.mm
        
        echo "=== Build OK ==="
        ls -la QNByPass.dylib
        file QNByPass.dylib
        
        EXIT=$?
        echo "Exit code: $EXIT"
        
        if [ $EXIT -eq 0 ] && [ -f QNByPass.dylib ]; then
          echo "=== SUCCESS ==="
          ls -la QNByPass.dylib
          file QNByPass.dylib
          
          # 伪签名
          ldid -S QNByPass.dylib 2>/dev/null || codesign -s - QNByPass.dylib 2>/dev/null || true
        else
          echo "=== FAILED ==="
          exit 1
        fi

    - name: Package DEB
      run: |
        set -e
        cd QNByPass
        
        mkdir -p deb_pkg/DEBIAN
        mkdir -p deb_pkg/Library/MobileSubstrate/DynamicLibraries
        
        cp QNByPass.dylib deb_pkg/Library/MobileSubstrate/DynamicLibraries/
        cp layout/Library/MobileSubstrate/DynamicLibraries/QNByPass.plist deb_pkg/Library/MobileSubstrate/DynamicLibraries/
        
        # Write control file using python to avoid YAML heredoc issues
        python3 -c "
ctl = '''Package: com.yourcompany.qnbypass
Name: QNByPass
Version: 1.0.0
Architecture: iphoneos-arm64
Description: Qunar jailbreak bypass for Dopamine RootHide
Maintainer: goulili75
Author: goulili75
Section: Tweaks
Depends: mobilesubstrate
'''
open('deb_pkg/DEBIAN/control','w').write(ctl)
"
        
        mkdir -p packages
        tar czf packages/QNByPass_1.0.0_iphoneos-arm64.tar.gz -C deb_pkg .
        
        echo "Package created"
        ls -la packages/

    - name: Upload deb
      uses: actions/upload-artifact@v4
      with:
        name: QNByPass-deb
        path: QNByPass/packages/*.deb
        retention-days: 30
