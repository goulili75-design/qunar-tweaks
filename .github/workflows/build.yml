name: Build QNByPass
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Tweak (arm64 for Dopamine)
      run: |
        set -e
        cd QNByPass
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        echo "SDK: $SDK"
        xcrun -sdk iphoneos clang -arch arm64 -miphoneos-version-min=14.0 -isysroot "$SDK" -fobjc-arc -I. -dynamiclib -framework Foundation -framework UIKit -Wl,-undefined,dynamic_lookup -o libasset_loader.dylib Tweak_Compiled.m 2>&1
        EXIT=$?
        echo "Exit code: $EXIT"
        ls -la libasset_loader.dylib
        SIZE=$(stat -f%z libasset_loader.dylib 2>/dev/null || stat -c%s libasset_loader.dylib 2>/dev/null || echo 0)
        echo "Size: $SIZE"
        if [ "$SIZE" -lt 10000 ]; then echo "ERROR: dylib too small!"; exit 1; fi
        file libasset_loader.dylib
        ldid -S libasset_loader.dylib 2>/dev/null || true
        echo "Tweak OK ($SIZE bytes)"
    - uses: actions/upload-artifact@v4
      with:
        name: QNByPass-DEB
        path: |
          QNByPass/libasset_loader.dylib
          QNByPass/filter.plist
        retention-days: 30
